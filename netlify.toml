[build]
  command = "npm run build"
  publish = "."

# Force HTTPS
[[redirects]]
  from = "http://congtyecomt.com/*"
  to = "https://congtyecomt.com/:splat"
  status = 301
  force = true

# Additional HTTPS redirect for www subdomain if needed
[[redirects]]
  from = "http://www.congtyecomt.com/*"
  to = "https://congtyecomt.com/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' https://congtyecomt.com https://formsubmit.co; frame-src https://www.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://formsubmit.co"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-XSS-Protection = "1; mode=block"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

[[headers]]
  for = "*.jpg"
