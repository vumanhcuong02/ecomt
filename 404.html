<style>/* Critical CSS - Above the fold */
*{font-family:'Be Vietnam Pro',sans-serif}html{scroll-behavior:smooth}
body{margin:0}.navbar{position:fixed;top:0;left:0;right:0;z-index:50;transition:all .3s ease}
.navbar.scrolled{background:rgba(15,15,15,.97)!important;box-shadow:0 2px 20px rgba(0,0,0,.3)}
.hero-slider{position:relative;overflow:hidden;height:100vh;min-height:600px}
.slide{position:absolute;inset:0;opacity:0;transition:opacity 1s ease}
.slide.active{opacity:1}
.slide img{width:100%;height:100%;object-fit:cover}
.slide-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,0,0,.65) 0%,rgba(34,197,94,.4) 100%)}
#mobile-menu{transition:all .3s ease;max-height:0;overflow:hidden}
#mobile-menu.open{max-height:500px}
.skip-link{position:absolute;top:-100%;left:16px;z-index:9999;background:#16a34a;color:#fff;padding:12px 24px;border-radius:0 0 8px 8px;font-weight:600;font-size:14px;text-decoration:none;transition:top .2s}
.skip-link:focus{top:0}
@keyframes pulse-ring{0%{transform:scale(.95);box-shadow:0 0 0 0 rgba(34,197,94,.7)}70%{transform:scale(1);box-shadow:0 0 0 12px rgba(34,197,94,0)}100%{transform:scale(.95)}}
.pulse{animation:pulse-ring 2s infinite}
</style>

  <script>/* Common JS - Inlined */
(function(){var n=document.getElementById('navbar');n&&window.addEventListener('scroll',function(){n.classList.toggle('scrolled',window.scrollY>60)});var o=new IntersectionObserver(function(e){e.forEach(function(t){t.isIntersecting&&t.target.classList.add('visible')})},{threshold:.15});document.querySelectorAll('.fade-in').forEach(function(e){o.observe(e)})})();
function toggleMenu(){var m=document.getElementById('mobile-menu'),i=document.getElementById('menu-icon');m&&m.classList.toggle('open');i&&(i.classList.toggle('fa-bars'),i.classList.toggle('fa-times'))}</script>
